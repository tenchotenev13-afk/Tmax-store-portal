@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{--navy:#0B1628;--indigo:#3B5BDB;--indigo2:#4C6EF5;--indigo-s:#EDF2FF;--emerald:#0CA678;--emerald-s:#E6FCF5;--rose:#F03E3E;--rose-s:#FFF5F5;--amber:#F59F00;--amber-s:#FFF9DB;--slate:#495057;--slate-l:#DEE2E6;--slate-xl:#F8F9FA;--red-b:#C92A2A;--red-b-s:#FFE3E3;--white:#FFF;--text:#212529;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:#F1F3F5;color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%}
.topbar{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.topbar-accent{height:4px;background:var(--indigo2)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:12px}
.topbar h1{font-size:14px;font-weight:600;color:#fff;letter-spacing:.02em;white-space:nowrap}
.topbar-score{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#fff;white-space:nowrap}
.topbar-score span{font-size:12px;color:#ADB5BD;font-family:'IBM Plex Sans',sans-serif;display:block;text-align:right}
.view{display:none}.view.active{display:block}
.nav-tabs{background:var(--navy);display:flex;border-top:1px solid rgba(255,255,255,.07)}
.nav-tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:500;color:#868E96;cursor:pointer;transition:all .15s;border:none;background:none;letter-spacing:.02em}
.nav-tab.active{color:var(--indigo2);border-bottom:2px solid var(--indigo2)}
.nav-tab:hover:not(.active){color:#CED4DA}
.info-panel{background:var(--white);margin:12px;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-field label{display:block;font-size:10px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.info-field input{width:100%;padding:8px 10px;border:1.5px solid var(--slate-l);border-radius:6px;font-size:14px;font-family:inherit;color:var(--text);background:var(--slate-xl);transition:border-color .15s}
.info-field input:focus{outline:none;border-color:var(--indigo2);background:#fff}
.info-field.full{grid-column:1/-1}
.section-hdr{margin:0 12px 0;padding:10px 14px;border-radius:var(--radius) var(--radius) 0 0;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:.02em}
.section-hdr .sect-score{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:20px}
.criteria-card{background:var(--white);margin:0 12px;border-radius:0;box-shadow:none;border-top:1px solid var(--slate-l);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.criteria-card:last-child{border-radius:0 0 var(--radius) var(--radius);margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.06)}
.criteria-card.blocking{background:var(--red-b-s);border-top-color:#FFC9C9}
.criteria-card.result-row{background:var(--emerald-s);border-top:2px solid var(--emerald)}
.criteria-card.auto-np{background:#F8F9FA;opacity:.7}
.criteria-label{font-size:13px;line-height:1.45;color:var(--text);font-weight:400}
.criteria-label .star{color:var(--indigo2);font-weight:700}
.criteria-label .star3{color:var(--rose);font-weight:700}
.criteria-label .block-tag{display:inline-block;font-size:10px;font-weight:700;color:var(--red-b);background:var(--red-b-s);border:1px solid #FFC9C9;padding:1px 6px;border-radius:4px;margin-right:4px;letter-spacing:.04em}
.criteria-num{font-size:10px;color:var(--slate);font-family:'IBM Plex Mono',monospace;margin-bottom:2px}
.score-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.score-btn{flex:1;min-width:52px;padding:10px 6px;border:2px solid var(--slate-l);border-radius:8px;background:var(--slate-xl);font-size:14px;font-weight:700;cursor:pointer;transition:all .12s;font-family:'IBM Plex Mono',monospace;color:var(--slate);text-align:center;-webkit-tap-highlight-color:transparent}
.score-btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.12)}
.score-btn.s1.active{background:var(--emerald);border-color:var(--emerald);color:#fff}
.score-btn.s05.active{background:var(--amber);border-color:var(--amber);color:#fff}
.score-btn.s0.active{background:var(--rose);border-color:var(--rose);color:#fff}
.score-btn.snp.active{background:var(--slate);border-color:var(--slate);color:#fff}
.score-btn.sda.active{background:var(--emerald);border-color:var(--emerald);color:#fff}
.score-btn.sne.active{background:var(--red-b);border-color:var(--red-b);color:#fff}
.np-badge{display:inline-block;padding:6px 14px;background:var(--slate-l);border-radius:6px;font-size:12px;font-weight:600;color:var(--slate);letter-spacing:.03em}
.note-toggle{font-size:11px;color:var(--indigo2);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;text-align:left}
.note-input{width:100%;padding:7px 10px;border:1.5px solid var(--slate-l);border-radius:6px;font-size:13px;font-family:inherit;color:var(--text);resize:vertical;min-height:52px;transition:border-color .15s}
.note-input:focus{outline:none;border-color:var(--indigo2)}
.repeat-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.repeat-label{font-size:11px;color:var(--slate)}
.repeat-btn{padding:4px 12px;border:1.5px solid var(--slate-l);border-radius:6px;background:var(--slate-xl);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--slate);transition:all .12s}
.repeat-btn.active-y{background:var(--rose-s);border-color:var(--rose);color:var(--rose)}
.repeat-btn.active-n{background:var(--emerald-s);border-color:var(--emerald);color:var(--emerald)}
.deadline-input{padding:4px 8px;border:1.5px solid var(--slate-l);border-radius:6px;font-size:12px;font-family:inherit;color:var(--text);background:var(--slate-xl);flex:1;min-width:120px}
.deadline-input:focus{outline:none;border-color:var(--indigo2)}
.result-row-inner{display:flex;flex-direction:column;gap:4px}
.result-row-inner .result-main{display:flex;align-items:center;justify-content:space-between;gap:8px}
.result-label{font-size:12px;font-weight:700;color:var(--emerald)}
.result-score{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;color:var(--emerald)}
.result-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.badge-ok{background:var(--emerald);color:#fff}
.badge-warn{background:var(--amber);color:#fff}
.badge-bad{background:var(--rose);color:#fff}
.result-detail{font-size:11px;color:var(--slate);font-family:'IBM Plex Mono',monospace;display:flex;gap:12px}

.summary-view{padding:12px}

.kpi-card{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border-top:3px solid var(--indigo2)}

.kpi-label{font-size:10px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-value{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;color:var(--text)}
.kpi-sub{font-size:11px;color:var(--slate);margin-top:2px}
.sector-summary{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.sector-sum-hdr{background:var(--navy);color:#fff;padding:10px 14px;font-size:12px;font-weight:600;letter-spacing:.04em}
.sector-sum-row{display:flex;align-items:center;padding:9px 14px;border-top:1px solid var(--slate-l);gap:8px}
.sector-sum-row .name{flex:1;font-size:12px;color:var(--text)}
.sector-sum-row .pct{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;min-width:44px;text-align:right}
.sector-sum-row .bar-wrap{width:80px;height:6px;background:var(--slate-l);border-radius:3px}
.sector-sum-row .bar{height:100%;border-radius:3px;transition:width .3s}
.pct-ok{color:var(--emerald)}.bar-ok{background:var(--emerald)}
.pct-warn{color:var(--amber)}.bar-warn{background:var(--amber)}
.pct-bad{color:var(--rose)}.bar-bad{background:var(--rose)}

.history-card-hdr .hshop{font-size:11px;color:#ADB5BD}
.history-card-body{padding:12px 14px}
.history-sectors{display:grid;grid-template-columns:1fr 1fr;gap:4px}

.hs-name{color:var(--slate)}.hs-pct{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px}

.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.trend-bar{width:100%;border-radius:3px 3px 0 0;transition:height .3s;min-height:3px}
.trend-bar-label{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--slate)}
.trend-bar-pct{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.chronic-item{padding:8px 10px;border-radius:6px;margin-bottom:6px;border-left:3px solid var(--rose);background:var(--rose-s);font-size:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.chronic-name{flex:1;color:var(--text);line-height:1.4}
.chronic-count{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--rose);white-space:nowrap}
.save-bar{position:sticky;bottom:0;background:var(--navy);padding:12px 16px;display:flex;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,.2)}

.btn-save:hover{background:#4263EB;transform:translateY(-1px)}
.btn-save:active{transform:translateY(0)}
.btn-clear{padding:14px 16px;border:2px solid rgba(255,255,255,.2);border-radius:var(--radius);background:transparent;color:#ADB5BD;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}

.bonus-banner{padding:14px 16px;border-radius:var(--radius);margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
.bonus-yes{background:var(--emerald);color:#fff}.bonus-no{background:var(--red-b);color:#fff}

.prev-row{background:var(--indigo-s);border-radius:6px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.prev-row .prev-label{color:var(--slate)}

.formula-note{font-size:10px;color:var(--slate);text-align:center;padding:6px;background:var(--indigo-s);border-radius:5px;margin:0 12px 6px;font-style:italic}
.pdf-btn-wrap{position:fixed;bottom:80px;right:16px;z-index:150}
.pdf-btn{background:var(--navy);color:#fff;border:none;border-radius:50px;padding:10px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;gap:6px;transition:all .15s}

<body>

<div class="pdf-btn-wrap">

</div>

<div class="topbar">

    <button class="nav-tab" onclick="switchView('history')">📈 История</button>
  </div>
</div>

<div id="view-check" class="view active">

      </div>

        <label>Дата</label>
        <input type="date" id="checkDate">
      </div>
      <div class="info-field">
        <label>Регионален управител</label>

      </div>
      <div class="info-field full">
        <label>Имейл за изпращане на репорта (незадължително)</label>

          <span class="prev-val" id="prevPctLabel">—</span>
        </div>
      </div>
    </div>
  </div>

  <div class="free-comment-section" style="margin:16px 0 8px;padding:14px 16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px">

  </div>
<div class="save-bar">
    <button class="btn-save" onclick="saveCheck()">💾 Запази проверката</button>
    <button class="btn-clear" onclick="clearCheck()">✕ Изчисти</button>
  </div>
</div>

<div id="view-summary" class="view">
  <div class="summary-view" id="summaryContent">
    <p style="color:var(--slate);font-size:13px;padding:20px 0;text-align:center">Попълнете проверката, за да видите резюмето.</p>
  </div>
</div>

<div id="view-history" class="view">
  <div id="histFilterBar" style="background:#EDF2FF;border-bottom:1px solid #C5D4FB;padding:8px 14px;position:sticky;top:89px;z-index:50">

    </div>
  </div>
  <div class="history-view" id="historyContent">
    <p class="empty-history">Все още няма запазени проверки.</p>
  </div>
</div>

// STATE
// ═══════════════════════════════════════════════════════════
let state = { blocking:{}, general:{}, specific:{}, notes:{}, repeat:{}, deadline:{} };

// ═══════════════════════════════════════════════════════════
// SCORING — съответства точно на Excel формулите
//
// Лист 1: genPct = SUM(non-NP gen scores) / COUNT(applicable non-NP criteria)
//          Пред-зададените Н/П (s13/s14/s15 критерии 2-6) не участват изобщо
//          Непопълнен критерий = 0 в числителя, 1 в знаменателя (Excel поведение)
//
// Лист 2: specPct = SUM(non-NP spec scores) / SUM(non-NP spec max)
//          Непопълнен критерий = 0 в числителя, max в знаменателя
//
// Лист 3: sectorPct = IFERROR(IF(specPct="Н/П", genPct, AVERAGE(genPct, specPct)), genPct)
//          = AVERAGE(genPct, specPct) ако и двата са налични
//          = genPct ако spec е Н/П
//
// Обща оценка (Лист 3): = AVERAGE(всичките 17 сектора)
// ═══════════════════════════════════════════════════════════

function getSectorScore(sector) {
  // Определяме кои общи критерии са приложими за сектора
  const applicableKeys = sector.generalApply || GENERAL_CRITERIA.map(gc => gc.key);

  // --- Общи критерии (Лист 1) ---
  let genScore = 0, genMax = 0;
  GENERAL_CRITERIA.forEach(gc => {
    if (!applicableKeys.includes(gc.key)) return; // пред-зададено Н/П → изключен изцяло
    const id = `${sector.id}_${gc.key}`;
    const val = state.general[id];
    if (val === 'NP') return; // потребителят е задал Н/П → изключен от знаменателя
    if (!val) return; // непопълнен → изключен (не влияе на резултата)
    genMax += 1;
    genScore += parseFloat(val) || 0;
  });
  const genPct = genMax > 0 ? genScore / genMax : null;

  // --- Специфични критерии (Лист 2) ---
  let specScore = 0, specMax = 0;
  sector.specific.forEach(sp => {
    const val = state.specific[sp.id];
    if (val === 'NP') return; // Н/П → изключен (IF(x="Н/П",0,max))
    if (!val) return; // непопълнен → изключен
    specMax += sp.stars;
    specScore += parseFloat(val) || 0;
  });
  const specPct = specMax > 0 ? specScore / specMax : null;

  // --- Обща оценка на сектора (Лист 3) ---
  // = IFERROR(IF(specPct="Н/П", genPct, AVERAGE(genPct, specPct)), genPct)
  let pct;
  if (genPct !== null && specPct !== null) {
    pct = (genPct + specPct) / 2;
  } else if (genPct !== null) {
    pct = genPct; // spec е изцяло Н/П → ползваме само общи
  } else if (specPct !== null) {
    pct = specPct;
  } else {
    pct = null;
  }

  return { score: genScore + specScore, maxScore: genMax + specMax, pct, genPct, specPct, genScore, genMax, specScore, specMax };
}

function getOverallScore() {
  const blockingFail = BLOCKING.some(b => state.blocking[b.id] === 'NE');

  // Средно само на ПОПЪЛНЕНИТЕ сектори
  // При пълен чеклист (всички 17 попълнени) = съответства на Excel формулата
  // При частично попълване = показва реален резултат от попълненото
  const sectorPcts = [];
  SECTORS.forEach(s => {
    const { pct } = getSectorScore(s);
    if (pct !== null) sectorPcts.push(pct);
  });

  const avgPct = sectorPcts.length > 0
    ? sectorPcts.reduce((a, b) => a + b, 0) / sectorPcts.length
    : null;

  const bonusOk = avgPct !== null && avgPct >= 0.85 && !blockingFail;
  return { pct: avgPct, bonusOk, blockingFail };
}

            <button class="score-btn snp" onclick="setScore('general','${id}','NP',this)">Н/П</button>
          </div>
          <div>
            <button class="note-toggle" onclick="toggleNote('gnote_${id}')">+ Забележка</button>

        </div>`;
      }

      <div style="font-size:11px;font-weight:600;color:var(--slate);letter-spacing:.04em;text-transform:uppercase">▸ Специфични критерии (макс: ${specMax} т.)</div>

      <div class="result-row-inner">
        <div class="result-main">
          <span class="result-label">Резултат — ${sector.name}</span>

        </div>
        <div class="result-detail" id="rdetail_${sector.id}"></div>
      </div>
    </div>`;

  container.innerHTML = html;
  updateScores();
}

function setScore(type, id, val, btn) {
  if (type === 'blocking') state.blocking[id] = val;
  else if (type === 'general') state.general[id] = val;
  else state.specific[id] = val;
  btn.closest('.score-row').querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateScores();
}

function setRepeat(id, val) {
  state.repeat[id] = val;
  document.getElementById(`rep_${id}_Y`).className = 'repeat-btn' + (val==='Y'?' active-y':'');
  document.getElementById(`rep_${id}_N`).className = 'repeat-btn' + (val==='N'?' active-n':'');
}

function toggleNote(id) {
  const extra = document.getElementById(id + '_extra');
  if (extra) { extra.style.display = extra.style.display==='none'?'block':'none'; return; }
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display==='none'?'block':'none';
}

function updateScores() {
  const { pct, bonusOk, blockingFail } = getOverallScore();

  // Топбар
  if (pct !== null) {
    const pctPct = Math.round(pct * 100);
    document.getElementById('topScoreLabel').textContent = `${pctPct}%`;
    document.getElementById('topScorePct').textContent = bonusOk ? '✅ С бонус' : '✗ Без бонус';
  } else {
    document.getElementById('topScoreLabel').textContent = '—';
    document.getElementById('topScorePct').textContent = '— %';
  }

  // Сектори
  SECTORS.forEach(s => {
    const { pct: sp, genPct, specPct, genScore, genMax, specScore, specMax } = getSectorScore(s);
    const pctEl = document.getElementById('sscore_' + s.id);
    const rscoreEl = document.getElementById('rscore_' + s.id);
    const rbadgeEl = document.getElementById('rbadge_' + s.id);
    const rdetailEl = document.getElementById('rdetail_' + s.id);
    if (!pctEl) return;

    if (sp === null) {
      pctEl.textContent = '—';
      if (rscoreEl) rscoreEl.textContent = '—';
      if (rbadgeEl) { rbadgeEl.textContent = '—'; rbadgeEl.className = 'result-badge'; }
      if (rdetailEl) rdetailEl.textContent = '';
      return;
    }

    const pctStr = `${Math.round(sp * 100)}%`;
    pctEl.textContent = pctStr;
    if (rscoreEl) rscoreEl.textContent = pctStr;

    if (sp >= 0.85) {
      if (rbadgeEl) { rbadgeEl.textContent = '✓ ОК'; rbadgeEl.className = 'result-badge badge-ok'; }
    } else if (sp >= 0.6) {
      if (rbadgeEl) { rbadgeEl.textContent = '⚠ ВНИМАНИЕ'; rbadgeEl.className = 'result-badge badge-warn'; }
    } else {
      if (rbadgeEl) { rbadgeEl.textContent = '✗ СЛАБ'; rbadgeEl.className = 'result-badge badge-bad'; }
    }

    // Детайли: Общи % + Специфични %
    if (rdetailEl) {
      const gStr = genPct !== null ? `${Math.round(genPct*100)}%` : '—';
      const sStr = specPct !== null ? `${Math.round(specPct*100)}%` : '—';
      rdetailEl.innerHTML = `<span>Общи: ${gStr} (${genScore}/${genMax})</span><span>Специфични: ${sStr} (${specScore.toFixed(1)}/${specMax})</span>`;
    }
  });

  if (document.getElementById('view-summary').classList.contains('active')) {
    renderSummary();
  }
}

// РЕЗЮМЕ
// ═══════════════════════════════════════════════════════════
function renderSummary() {
  // Резюмето е за текущата незапазена проверка (не за история по магазин)
  const { pct, bonusOk, blockingFail } = getOverallScore();
  const blockFails = BLOCKING.filter(b => state.blocking[b.id] === 'NE');
  let html = '';

  if (pct !== null) {
    const pctVal = Math.round(pct * 100);
    if (bonusOk) {
      html += `<div class="bonus-banner bonus-yes"><span class="bonus-icon">✅</span><span>БОНУС ОДОБРЕН — ${pctVal}%</span></div>`;
    } else {
      const reason = blockingFail ? 'блокиращ критерий' : `${pctVal}% < 85%`;
      html += `<div class="bonus-banner bonus-no"><span class="bonus-icon">✗</span><span>БЕЗ БОНУС — ${reason}</span></div>`;
    }
  }

  const okSectors = SECTORS.filter(s => { const {pct:sp}=getSectorScore(s); return sp!==null&&sp>=0.85; }).length;
  const ok_class = pct===null?'':pct>=0.85?'ok':pct>=0.6?'warn':'bad';

  html += `<div class="kpi-grid">
    <div class="kpi-card ${ok_class}">
      <div class="kpi-label">Обща оценка</div>
      <div class="kpi-value">${pct!==null?Math.round(pct*100)+'%':'—'}</div>
      <div class="kpi-sub">СРЕДНО на 17 сектора</div>
    </div>
    <div class="kpi-card ${bonusOk?'ok':'bad'}">
      <div class="kpi-label">Бонус</div>
      <div class="kpi-value" style="font-size:18px">${bonusOk?'✅ ДА':'✗ НЕ'}</div>
      <div class="kpi-sub">Праг: ≥85%</div>
    </div>
    <div class="kpi-card ${blockFails.length?'block':'ok'}">
      <div class="kpi-label">Блокиращи</div>
      <div class="kpi-value">${blockFails.length} НЕ</div>
      <div class="kpi-sub">от ${BLOCKING.length} критерия</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Сектори ОК</div>
      <div class="kpi-value">${okSectors}</div>
      <div class="kpi-sub">от ${SECTORS.length} сектора</div>
    </div>
  </div>`;

  if (blockFails.length) {
    html += `<div style="margin-bottom:14px"><div class="trend-title" style="margin-bottom:8px;font-size:12px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.04em">⛔ Блокиращи нарушения</div>`;
    blockFails.forEach(b => {
      html += `<div class="chronic-item"><span class="chronic-name">${b.text}</span><span class="chronic-count">НЕ</span></div>`;
    });
    html += `</div>`;
  }

  html += `<div class="sector-summary"><div class="sector-sum-hdr">Резултати по сектори (Общи % + Специфични %) / 2</div>`;
  SECTORS.forEach(s => {
    const { pct: sp, genPct, specPct } = getSectorScore(s);
    const cls = sp===null?'':sp>=0.85?'pct-ok':sp>=0.6?'pct-warn':'pct-bad';
    const barCls = sp===null?'':sp>=0.85?'bar-ok':sp>=0.6?'bar-warn':'bar-bad';
    const pctVal = sp !== null ? Math.round(sp*100) : null;
    const gStr = genPct !== null ? Math.round(genPct*100)+'%' : '—';
    const sStr = specPct !== null ? Math.round(specPct*100)+'%' : '—';
    html += `<div class="sector-sum-row">
      <span class="name" style="flex:1.5">${s.name}</span>
      <span style="font-size:10px;color:var(--slate);min-width:90px">О:${gStr} С:${sStr}</span>
      <div class="bar-wrap"><div class="bar ${barCls}" style="width:${pctVal||0}%"></div></div>
      <span class="pct ${cls}">${pctVal!==null?pctVal+'%':'—'}</span>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('summaryContent').innerHTML = html;
}

// ── ЧЕТИМО ИМЕ НА КРИТЕРИЙ (за забележки и повторни грешки) ──────
function criterionLabel(id) {
  // Блокиращ: b1, b2...
  const bm = id.match(/^b(\d+)$/);
  if (bm) {
    const b = BLOCKING[parseInt(bm[1]) - 1];
    return b ? `Блокиращ ${bm[1]}: ${b.text.slice(0, 55)}` : id;
  }
  // Общи критерии: s1_clean, s2_labels...
  const gm = id.match(/^(s\d+)_(clean|labels|arrange|pallet|corridor|high)$/);
  if (gm) {
    const sector = SECTORS.find(s => s.id === gm[1]);
    const gc = GENERAL_CRITERIA.find(g => g.key === gm[2]);
    if (sector && gc) {
      const gcShort = gc.label.split('—')[0].trim();
      return `${sector.name} → ${gcShort}`;
    }
  }
  // Специфични критерии: s1_1, s2_3...
  const sm = id.match(/^(s\d+)_(\d+)$/);
  if (sm) {
    const sector = SECTORS.find(s => s.id === sm[1]);
    if (sector) {
      const sp = sector.specific[parseInt(sm[2]) - 1];
      if (sp) return `${sector.name} → ${sp.text.slice(0, 65)}${sp.text.length > 65 ? '…' : ''}`;
    }
  }
  return id;
}

// ── ВАЛИДАЦИЯ ПРЕДИ ЗАПАЗВАНЕ ────────────────────────────────────
function validateCheck() {
  const errors = [];
  let missingGen = 0, missingSpec = 0;

  // Блокиращи
  BLOCKING.forEach((b, i) => {
    if (!state.blocking[b.id]) errors.push(`⛔ Блокиращ ${i + 1} — непопълнен`);
  });

  // Общи и специфични по сектор
  SECTORS.forEach(sector => {
    const applicableKeys = sector.generalApply || GENERAL_CRITERIA.map(gc => gc.key);
    applicableKeys.forEach(key => {
      if (!state.general[`${sector.id}_${key}`]) missingGen++;
    });
    sector.specific.forEach(sp => {
      if (!state.specific[sp.id]) missingSpec++;
    });
  });

  if (missingGen > 0)  errors.push(`📋 ${missingGen} непопълнени общи критерия`);
  if (missingSpec > 0) errors.push(`📋 ${missingSpec} непопълнени специфични критерия`);

  return errors;
}

var autosaveInterval = null;

function saveDraft() {
  try {
    const shop = document.getElementById('shop').value.trim();
    if (!shop) return; // Не запазваме без магазин
    const draft = {
      ts: Date.now(),
      shop,
      date: document.getElementById('checkDate').value,
      manager: document.getElementById('manager').value,
      email: document.getElementById('reportEmail').value,
      generalComment: (document.getElementById('generalComment') || {}).value || '',
      state: JSON.parse(JSON.stringify(state)),
    };
    localStorage.setItem('temax_draft', JSON.stringify(draft));
  } catch(e) {}
}

function clearDraft() {
  localStorage.removeItem('temax_draft');
}

function startAutosave() {
  if (autosaveInterval) clearInterval(autosaveInterval);
  autosaveInterval = setInterval(saveDraft, 60000); // на 60 сек.
}

function checkDraft() {
  try {
    const raw = localStorage.getItem('temax_draft');
    if (!raw) return;
    const draft = JSON.parse(raw);
    const age = Date.now() - draft.ts;
    if (age > 24 * 60 * 60 * 1000) { // по-стара от 24ч → изтриваме
      clearDraft(); return;
    }
    const mins = Math.round(age / 60000);
    const timeAgo = mins < 1 ? 'преди малко' : `преди ${mins} мин.`;
    const restore = confirm(`Намерена е незапазена проверка за "${draft.shop}" (${timeAgo}).\nИскате ли да я възстановите?`);
    if (restore) {
      document.getElementById('shop').value = draft.shop || '';
      document.getElementById('checkDate').value = draft.date || '';
      document.getElementById('manager').value = draft.manager || '';
      document.getElementById('reportEmail').value = draft.email || '';
      if (document.getElementById('generalComment')) {
        document.getElementById('generalComment').value = draft.generalComment || '';
      }
      if (draft.state) {
        Object.assign(state, draft.state);
        renderAll && renderAll();
      }
      showSyncNotification('✅ Черновата е възстановена.', 'success');
    } else {
      clearDraft();
    }
  } catch(e) {}
}

function showSyncNotification(msg, type) {
  const existing = document.getElementById('syncNotif');
  if (existing) existing.remove();
  const colors = {
    success: {bg:'#E6F9F1', border:'#0A7C59', color:'#0A7C59'},
    warning: {bg:'#FEF3C7', border:'#B45309', color:'#B45309'},
    error:   {bg:'#FDE8E8', border:'#C0392B', color:'#C0392B'},
  };
  const c = colors[type] || colors.warning;
  const el = document.createElement('div');
  el.id = 'syncNotif';
  el.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;
    background:${c.bg};border:1.5px solid ${c.border};border-radius:10px;padding:10px 18px;
    font-size:13px;font-weight:600;color:${c.color};max-width:90vw;text-align:center;
    box-shadow:0 4px 16px rgba(0,0,0,.12)`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

function updateEntrySyncStatus(shopKey, entryTs, synced) {
  try {
    const history = loadHistory();
    // Match by id (number) or ts (string)
    const idx = history.findIndex(e => e.id === entryTs || e.ts === entryTs || String(e.id) === String(entryTs));
    if (idx >= 0) {
      history[idx].synced = synced;
      localStorage.setItem('checklist_history', JSON.stringify(history));
    }
  } catch(e) {}
}

function saveCheck() {
  const shop = document.getElementById('shopName').value.trim();
  const date = document.getElementById('checkDate').value;
  const manager = document.getElementById('managerName').value.trim();
  if (!shop || !date) { alert('Моля, попълнете магазин и дата преди да запазите.'); return; }

  // Валидация — всички критерии трябва да са попълнени
  const validationErrors = validateCheck();
  if (validationErrors.length > 0) {
    alert('⚠ Не може да се запази — има непопълнени полета:\n\n' + validationErrors.join('\n'));
    return;
  }

  const { pct, bonusOk, blockingFail } = getOverallScore();
  const sectorResults = {};
  SECTORS.forEach(s => { sectorResults[s.id] = getSectorScore(s); });

  const entryId = Date.now();
  const entry = {
    id: entryId, shop, date, manager,
    pct, bonusOk, blockingFail, sectorResults,
    state: JSON.parse(JSON.stringify(state)),
    ts: new Date().toISOString(),
    synced: false,
  };

  let history = loadHistory();
  history.unshift(entry);
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem('checklist_history', JSON.stringify(history));

  // Изпращане към Google Sheets
  const sheetsUrl = 'https://script.google.com/macros/s/AKfycbyi0HloLVLVR4AVkq--GpqQpXoz2-J7UirNOMt5ROdzP1bmNsrulVEW26A5aHhnHs4U/exec';
  const sectorData = {};
  Object.keys(sectorResults).forEach(sid => {
    const sr = sectorResults[sid];
    sectorData[sid] = { combinedPct: sr.pct, genPct: sr.genPct, specPct: sr.specPct, score: sr.score, maxScore: sr.maxScore };
  });
  const notesArr = [], repeatArr = [], deadlineArr = [];
  Object.keys(state.notes||{}).forEach(k => { if(state.notes[k]) notesArr.push(criterionLabel(k)+': '+state.notes[k]); });
  Object.keys(state.repeat||{}).forEach(k => { if(state.repeat[k]==='Y') repeatArr.push(criterionLabel(k)); });
  Object.keys(state.deadline||{}).forEach(k => { if(state.deadline[k]) deadlineArr.push(criterionLabel(k)+': '+state.deadline[k]); });

  const payload = {
    shop, date, manager, savedAt: entry.ts,
    avgPct: pct, bonusOk, blockFail: blockingFail,
    sectorData, state: entry.state,
    notes: notesArr.join(' | '), repeatIssues: repeatArr.join(', '), deadlines: deadlineArr.join(' | '),
  };
  // Изпращане на данни чрез Script tag (JSONP) — по-надеждно от Image
  const leanPayload = {
    shop, date, manager, savedAt: entry.ts,
    avgPct: pct, bonusOk, blockFail: blockingFail,
    blocking: state.blocking,
    sectorData,
    // Лимит: Apps Script URL параметри имат ~4KB лимит след декодиране
    notes: notesArr.join(' | ').slice(0, 600),
    generalComment: (document.getElementById('generalComment').value || '').trim().slice(0, 400),
    repeatIssues: repeatArr.join(', ').slice(0, 250),
    deadlines: deadlineArr.join(' | ').slice(0, 250),
  };
  const emailTo = document.getElementById('reportEmail').value.trim();
  const pctVal  = pct !== null ? Math.round(pct * 100) : null;

  const saveCbName = '_save_' + Date.now();
  window[saveCbName] = function(r) {
    delete window[saveCbName];
    const s = document.getElementById('_saveJsonp');
    if (s) s.remove();

    if (!r || r.status !== 'ok') {
      console.warn('Грешка при запис:', r && r.message);
      updateEntrySyncStatus('checklist_history', entryId, false);
      renderHistory();
      showSyncNotification('⚠️ Запазено само на устройството. Използвайте История → Изпрати отново.', 'warning');
      return;
    }
    // Успешно записано в Sheets
    updateEntrySyncStatus('checklist_history', entryId, true);
    renderHistory();
    showSyncNotification('✅ Изпратено успешно в базата!', 'success');

    // Изпращаме имейл САМО след потвърждение, че данните са записани
    if (emailTo && pctVal !== null) {
      setTimeout(function() {
        const emailCb = '_emailCb' + Date.now();
        window[emailCb] = function(er) {
          delete window[emailCb];
          if (er && er.status === 'ok') {
            console.log('✅ Имейл изпратен към', emailTo);
          } else {
            console.warn('❌ Имейл грешка:', er && er.message);
          }
        };
        const emailScript = document.createElement('script');
        emailScript.src = sheetsUrl
          + '?action=sendEmail'
          + '&to='      + encodeURIComponent(emailTo)
          + '&shop='    + encodeURIComponent(shop)
          + '&date='    + encodeURIComponent(date)
          + '&manager=' + encodeURIComponent(manager)
          + '&callback=' + emailCb;
        document.head.appendChild(emailScript);
      }, 4000); // 4 секунди — за да се запишат данните в Sheets преди lookup
    }
  };

  // Таймаут — ако след 15 сек. няма потвърждение, предупреждаваме
  const saveTimeout = setTimeout(function() {
    if (window[saveCbName]) {
      delete window[saveCbName];
      console.warn('Save timeout — Apps Script не отговори');
      // НЕ показваме alert тук — потребителят вече е видял "запазено"
    }
  }, 15000);

  const origCb = window[saveCbName];
  window[saveCbName] = function(r) {
    clearTimeout(saveTimeout);
    origCb(r);
  };

  const saveScript = document.createElement('script');
  saveScript.id = '_saveJsonp';
  const saveUrl = sheetsUrl + '?data=' + encodeURIComponent(JSON.stringify(leanPayload)) + '&callback=' + saveCbName;
  console.log('Save URL дължина:', saveUrl.length, 'символа');
  saveScript.src = saveUrl;
  saveScript.onerror = function() {
    clearTimeout(saveTimeout);
    console.warn('Script load грешка при запис');
  };
  document.head.appendChild(saveScript);

  alert(`✅ Проверката е запазена!\n${shop} — ${date}\nОбща оценка: ${pctVal!==null?pctVal+'%':'—'}\n${bonusOk?'✅ Бонус одобрен':'✗ Без бонус'}`);

  clearDraft();
  document.getElementById('generalComment').value = '';
  renderHistory();
  showPrevInfo();
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('checklist_history') || '[]'); } catch { return []; }
}

function clearCheck() {
  if (!confirm('Изчистване на всички данни?')) return;
  state = { blocking:{}, general:{}, specific:{}, notes:{}, repeat:{}, deadline:{} };
  buildCheckUI();
  document.getElementById('shopName').value = '';
  document.getElementById('checkDate').value = new Date().toISOString().slice(0,10);
  checkDraft();
  startAutosave();
  document.getElementById('managerName').value = '';
}

function showPrevInfo() {
  const h = loadHistory();
  if (h.length < 2) return;
  const prev = h[1];
  document.getElementById('prevInfoRow').style.display = 'block';
  document.getElementById('prevDateLabel').textContent = prev.date;
  document.getElementById('prevPctLabel').textContent = prev.pct!==null?Math.round(prev.pct*100)+'% (предишна)':'—';
}

        ${!isSynced ? `<button onclick="resendToSheets(${entry.id})" style="padding:4px 10px;background:#3B5BDB;border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:600;cursor:pointer">🔄 Изпрати в базата</button>` : ''}
        <button onclick="resendEmail(${entry.id})" style="padding:4px 10px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:6px;color:#fff;font-size:11px;cursor:pointer">📧 Имейл</button>
      </div>
    </div>`;
    html += `</div></div>`;
  });

  html += `<div style="text-align:center;padding:10px 0 20px"><button onclick="exportHistory()" style="padding:10px 20px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">⬇ Изтегли историята (JSON)</button></div>`;

  container.innerHTML = html;
  const currentShopForLabel = document.getElementById('shopName').value.trim();
  const shopLabel = document.getElementById('histShopLabel');
  if (shopLabel) shopLabel.textContent = currentShopForLabel || '(въведете магазин)';
  const cnt = document.getElementById('filterCount');
  if (cnt) cnt.textContent = filtered.length + ' проверки';
}

function buildShopFilter(history) {
  const shops = [...new Set(history.map(e=>e.shop).filter(Boolean))].sort();
  const sel = document.getElementById('shopFilterSelect');
  if (!sel) return;
  sel.innerHTML = '<option value="ALL">Всички магазини</option>';
  shops.forEach(s => { sel.innerHTML += `<option value="${s}" ${s===activeShopFilter?'selected':''}>${s}</option>`; });
}

function setShopFilter(shop) { activeShopFilter = shop; renderHistory(); }

function exportHistory() {
  const blob = new Blob([JSON.stringify(loadHistory(), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `checklist_history_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const tabs = {check:0,summary:1,history:2};
  document.querySelectorAll('.nav-tab')[tabs[name]].classList.add('active');
  if (name==='summary') renderSummary();
  if (name==='history') renderHistory();
}
